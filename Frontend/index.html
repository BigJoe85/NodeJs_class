<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <a href="./src/login.html">Login Page</a>
    <form method="POST action="/register" enctype="multipart/form-data" id="registerForm">
      <input type="image" src="" alt="" id="image"> <br />
      <input type="text" name="userName" id="userName" placeholder="UserName"> <br />
      <input type="email" name="email" id="email" placeholder="Email"> <br />
      <input type="password" name="password" id="password" placeholder="Password"> <br />
      <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Password"> <br />
      <select name="" id="role">
        <option value="">Select Role</option>
        <option value="admin">Admin</option>
        <option value="user">User</option>
      </select>

      <button type="submit" id="submitbtn">Submit</button> 
    </form>


    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
